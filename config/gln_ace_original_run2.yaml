targets: ner

ner:
  Corpus: ColumnCorpus-1
  ColumnCorpus-1:
    data_folder: DATASETS/GREEKLEGALNERV2
    column_format:
      0: text
      1: ner
    tag_to_bioes: ner
  tag_dictionary: resources/taggers/gln_ace_original_run2/tags.pkl

target_dir: resources/taggers/
model_name: gln_ace_original_run2

Controller:
  model_structure: null

model:
  FastSequenceTagger:
    hidden_size: 256
    use_crf: true
    use_rnn: true
    rnn_layers: 1
    dropout: 0.0
    word_dropout: 0.05
    locked_dropout: 0.5
    sentence_loss: true

embeddings:
  # === Contextual Transformer Embeddings (3) ===
  TransformerWordEmbeddings-0:
    model: DATASETS/GREEKLEGALNERV2/GreekLegalRoBERTa/greek_legal_ner/joelito/legal-greek-roberta-base/results_after_training_only_on_language_with_id__el/seed_1
    layers: "-1"
    pooling_operation: "first"
    use_scalar_mix: false
    fine_tune: false
  TransformerWordEmbeddings-1:
    model: DATASETS/GREEKLEGALNERV2/GreekBERT/greek_legal_ner/nlpaueb/bert-base-greek-uncased-v1/results_after_training_only_on_language_with_id__el/seed_1
    layers: "-1"
    pooling_operation: "first"
    use_scalar_mix: false
    fine_tune: false
  TransformerWordEmbeddings-2:
    model: DATASETS/GREEKLEGALNERV2/mdeberta-v3-base/seed_1
    layers: "-1"
    pooling_operation: "first"
    use_scalar_mix: false
    fine_tune: false
  # === Non-Contextual Embeddings (3) ===
  WordEmbeddings-0:
    embeddings: DATASETS/GREEKLEGALNERV2/cc.el.300.vec
  BytePairEmbeddings-0:
    language: el
    dim: 300
    syllables: 100000
  FastCharacterEmbeddings:
    char_embedding_dim: 25
    hidden_size_char: 25

interpolation: 0.5

trainer: ReinforcementTrainer
ReinforcementTrainer:
  controller_learning_rate: 0.1
  controller_optimizer: SGD
  distill_mode: false
  optimizer: SGD
  sentence_level_batch: true

train:
  max_episodes: 30
  max_epochs: 150
  monitor_test: true
  continue_training: false
  mini_batch_size: 8
  learning_rate: 0.1
  min_learning_rate: 0.0001
  max_epochs_without_improvement: 15
  patience: 5
  save_final_model: true
  train_with_dev: false
  true_reshuffle: false
  controller_momentum: 0.9
  discount: 0.5
